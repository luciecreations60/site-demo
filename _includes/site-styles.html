<style>
      /* =========================================================================
         PALETTES DE COULEURS PROPOSÉES (Modifiables par la liste déroulante)
         ========================================================================= */

      /* Thème 1 : Émeraude & Tilleul (Idéal Nature / Paysagiste) */
      :root, [data-theme="theme-emeraude"] {
        --heroFond: url('{{ info.images.heroFond }}');
        --couleur-fond-site: #f8fafc;
        --couleur-fond-site-light: #f1f5f9;
        --couleur-fond-bloc: #0f2d1e; /* Vert Sombre forestier */
        --couleur-sous-titre: #166534;
        --couleur-texte: #0f172a;
        --couleur-accent: #84cc16; /* Vert Tilleul Éclatant */
      }

      /* Thème 2 : Ambre & Ardoise (Idéal Moderne / Électricien) */
      [data-theme="theme-ambre"] {
        --couleur-fond-site: #fdfdfd;
        --couleur-fond-site-light: #f4f4f6;
        --couleur-fond-bloc: #1e293b; /* Gris Ardoise */
        --couleur-sous-titre: #475569;
        --couleur-texte: #0f172a;
        --couleur-accent: #f59e0b; /* Orange Ambre Énergie */
      }

      /* Thème 3 : Bleu Minuit & Or (Idéal Rénovation / Premium) */
      [data-theme="theme-minuit"] {
        --couleur-fond-site: #fafaf9;
        --couleur-fond-site-light: #f5f5f4;
        --couleur-fond-bloc: #0b1a30; /* Bleu Nuit Intense */
        --couleur-sous-titre: #1e3a8a;
        --couleur-texte: #1c1917;
        --couleur-accent: #d97706; /* Or Chaud / Ambre Foncé */
      }

      /* Thème 4 : Brique & Sable (Idéal Artisanal / Maçon) */
      [data-theme="theme-brique"] {
        --couleur-fond-site: #fcfbfa;
        --couleur-fond-site-light: #f7f4ef;
        --couleur-fond-bloc: #7c2d12; /* Terracotta / Brique */
        --couleur-sous-titre: #9a3412;
        --couleur-texte: #292524;
        --couleur-accent: #ea580c; /* Orange Brûlé */
      }

      /* =========================================================================
         STYLES GÉNÉRAUX DU SITE
         ========================================================================= */
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--couleur-fond-site);
        color: var(--couleur-texte);
        -webkit-font-smoothing: antialiased;
      }

      h1, h2, h3, .font-serif {
        font-family: 'Playfair Display', serif;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
      }
      .text-center { text-align: center; }
      .mb-12 { margin-bottom: 48px; }
      .italic { font-style: italic; color: var(--couleur-accent); }
      .leaf-shape { border-radius: 40px 4px 40px 4px !important; }

      /* NAVIGATION & DÉMO SELECTOR */
      .header {
        position: sticky;
        top: 0;
        background: rgba(255, 255, 255, 0.98);
        border-bottom: 1px solid #e2e8f0;
        z-index: 50;
      }
      .header-flex {
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 80px;
      }
      .brand-name { display: block; font-size: 24px; font-weight: bold; color: var(--couleur-fond-bloc); }
      .brand-sub { display: block; font-size: 11px; text-transform: uppercase; color: var(--couleur-sous-titre); letter-spacing: 1px; margin-top: 2px; }
      
      .nav-actions {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      /* Style du sélecteur de palette */
      .theme-selector {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
        background-color: #fff;
        font-size: 13px;
        font-family: inherit;
        color: #334155;
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      }
      .theme-selector:focus { outline: 2px solid var(--couleur-accent); }

      .btn-tel { background: var(--couleur-fond-bloc); color: white; padding: 12px 24px; border-radius: 50px; text-decoration: none; font-size: 14px; font-weight: 600; transition: background 0.2s; }
      .btn-tel:hover { opacity: 0.9; }

      /* HERO */
      .hero {
        background: linear-gradient(rgba(15, 45, 30, 0.85), rgba(15, 45, 30, 0.85)), var(--heroFond) no-repeat center/cover;
        padding: 160px 0;
        color: white;
        transition: background 0.3s;
      }
      .badge { display: inline-block; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); padding: 6px 18px; border-radius: 50px; font-size: 12px; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.5px; }
      .hero-title { font-size: 54px; margin: 0 0 24px 0; font-weight: 700; line-height: 1.2; }
      .hero-text { font-size: 19px; max-width: 650px; margin: 0 auto 40px auto; color: #f1f5f9; font-weight: 300; line-height: 1.6; }
      .btn-main { background: var(--couleur-accent); color: white; padding: 16px 36px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
      /* Correction couleur texte bouton pour lisibilité selon l'accent */
      [data-theme="theme-emeraude"] .btn-main { color: var(--couleur-fond-bloc); }

      /* SECTIONS */
      .section { padding: 100px 0; }
      .bg-white { background: white; }
      .bg-light { background: var(--couleur-fond-site-light); }
      .section-title { font-size: 40px; color: var(--couleur-fond-bloc); margin: 0 0 16px 0; }
      .section-sub { color: #475569; font-size: 16px; margin: 0; font-weight: 300; max-width: 600px; margin: 0 auto; }

      /* VALEURS */
      .valeurs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 32px; }
      .valeur-card { background: var(--couleur-fond-site-light); padding: 32px; border-radius: 16px; border-left: 4px solid var(--couleur-accent); }
      .valeur-icon { font-size: 32px; margin-bottom: 16px; }
      .valeur-titre { font-size: 22px; margin: 0 0 12px 0; color: var(--couleur-fond-bloc); }
      .valeur-text { margin: 0; color: #334155; line-height: 1.6; font-weight: 300; }

      /* SERVICES */
      .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 32px; }
      .service-bg-card { position: relative; height: 380px; overflow: hidden; display: flex; align-items: flex-end; color: white; text-decoration: none; }
      .service-bg-card .img-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to top, rgba(15, 23, 42, 0.95) 20%, rgba(15, 23, 42, 0.4) 60%, rgba(0,0,0,0) 100%); z-index: 1; }
      .service-bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
      .service-bg-card:hover .service-bg-img { transform: scale(1.05); }
      .service-content { position: relative; z-index: 2; padding: 40px; }
      .service-titre { font-size: 26px; margin: 0 0 12px 0; font-family: 'Playfair Display'; }
      .service-desc { margin: 0; font-size: 14px; color: #cbd5e1; line-height: 1.5; font-weight: 300; }

      /* CHIFFRES & EQUIPE */
      .about-split { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 60px; align-items: center; }
      .about-img { width: 100%; height: 400px; object-fit: cover; }
      .chiffres-flex { display: flex; justify-content: space-between; margin-top: 40px; background: white; padding: 24px; border-radius: 16px; border: 1px solid #e2e8f0; }
      .chiffre-item { text-align: center; flex: 1; }
      .chiffre-num { font-size: 36px; font-weight: 900; color: var(--couleur-accent); display: block; font-family: 'Playfair Display'; }
      .chiffre-label { font-size: 12px; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; display: block; }

      /* PORTFOLIO */
      .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 32px; }
      .portfolio-card { background: white; overflow: hidden; border: 1px solid #e2e8f0; }
      .portfolio-img-box { position: relative; height: 260px; overflow: hidden; }
      .portfolio-img { width: 100%; height: 100%; object-fit: cover; }
      .portfolio-theme { position: absolute; top: 16px; left: 16px; background: var(--couleur-fond-bloc); color: white; padding: 4px 12px; font-size: 11px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; border-radius: 4px; }
      .portfolio-info { padding: 20px; font-weight: 600; color: var(--couleur-fond-bloc); font-size: 16px; }

      /* REVIEWS */
      .reviews-split { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 900px; margin: 0 auto; }
      .widget { background: white; border: 1px solid #e2e8f0; padding: 32px; border-radius: 24px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
      .rating-num { font-size: 44px; font-weight: 900; color: var(--couleur-fond-bloc); font-family: 'Playfair Display'; }
      .rating-stars { color: #f59e0b; font-size: 20px; margin: 8px 0; }
      .review { background: var(--couleur-fond-site-light); padding: 24px; border-radius: 16px; text-align: left; margin-bottom: 16px; }
      .review-meta { font-weight: bold; font-size: 14px; color: var(--couleur-fond-bloc); margin-bottom: 8px; display: block; }
      .review-text { font-style: italic; color: #334155; margin: 0; font-size: 14px; line-height: 1.5; font-weight: 300; }

      /* PARTENAIRES */
      .partenaires-section { background: var(--couleur-fond-site-light); padding: 40px 0; border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; }
      .partenaires-flex { display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 24px; }
      .partenaire-logo { font-weight: 600; color: #64748b; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; }

      /* FOOTER */
      .footer { background: var(--couleur-fond-bloc); color: white; padding: 80px 0; border-top: 8px solid var(--couleur-accent); transition: border-color 0.3s; }
      .info-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); padding: 32px; border-radius: 24px; max-width: 700px; margin: 40px auto 0 auto; }
      .info-label { font-size: 11px; color: var(--couleur-accent); font-weight: bold; margin-bottom: 8px; letter-spacing: 1px; }
      .info-val { margin: 0; font-size: 15px; color: #cbd5e1; }
    </style>
