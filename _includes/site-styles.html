  /* =========================================================================
     STYLE GÉNÉRAL
     ========================================================================= */
  body {
    margin: 0; font-family: 'Inter', sans-serif;
    background-color: var(--couleur-fond-site); color: var(--couleur-texte);
    -webkit-font-smoothing: antialiased; transition: all 0.3s ease;
  }
  h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .text-center { text-align: center; }
  .mb-12 { margin-bottom: 48px; }
  .italic { font-style: italic; color: var(--couleur-accent); }
  .leaf-shape { border-radius: 40px 4px 40px 4px !important; }
  .header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.98); border-bottom: 1px solid #e2e8f0; z-index: 50; }
  .header-flex { display: flex; justify-content: space-between; align-items: center; height: 80px; }
  .brand-name { display: block; font-size: 24px; font-weight: bold; color: var(--couleur-fond-bloc); }
  .brand-sub { display: block; font-size: 11px; text-transform: uppercase; color: var(--couleur-texte); letter-spacing: 1px; margin-top: 2px; opacity: 0.8; }
  .nav-actions { display: flex; align-items: center; gap: 16px; }
  .theme-selector { padding: 8px 12px; border-radius: 6px; border: 1px solid #cbd5e1; background-color: #fff; font-size: 13px; color: #334155; cursor: pointer; }
  .btn-tel { background: var(--couleur-fond-bloc); color: white; padding: 12px 24px; border-radius: 50px; text-decoration: none; font-size: 14px; font-weight: 600; }
  .hero { background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), var(--heroFond) no-repeat center/cover; padding: 160px 0; color: white; }
  .badge { display: inline-block; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); padding: 6px 18px; border-radius: 50px; font-size: 12px; margin-bottom: 24px; text-transform: uppercase; }
  .hero-title { font-size: 54px; margin: 0 0 24px 0; font-weight: 700; line-height: 1.2; }
  .hero-text { font-size: 19px; max-width: 650px; margin: 0 auto 40px auto; color: #f1f5f9; font-weight: 300; line-height: 1.6; }
  .btn-main { background: var(--couleur-accent); color: white; padding: 16px 36px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; }
  .section { padding: 100px 0; }
  .bg-white { background: var(--couleur-fond-site-light); }
  .bg-light { background: var(--couleur-fond-site); }
  .section-title { font-size: 40px; color: var(--couleur-fond-bloc); margin: 0 0 16px 0; }
  .section-sub { color: var(--couleur-texte); opacity: 0.8; font-size: 16px; font-weight: 300; max-width: 600px; margin: 0 auto; }
  .valeurs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 32px; }
  .valeur-card { background: var(--couleur-fond-site); padding: 32px; border-radius: 16px; border-left: 4px solid var(--couleur-accent); }
  .valeur-icon { font-size: 32px; margin-bottom: 16px; }
  .valeur-titre { font-size: 22px; margin: 0 0 12px 0; color: var(--couleur-fond-bloc); }
  .valeur-text { margin: 0; color: var(--couleur-texte); line-height: 1.6; font-weight: 300; }
  .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 32px; }
  .service-bg-card { position: relative; height: 380px; overflow: hidden; display: flex; align-items: flex-end; color: white; text-decoration: none; }
  .service-bg-card .img-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to top, rgba(15, 23, 42, 0.95) 20%, rgba(15, 23, 42, 0.4) 60%, rgba(0,0,0,0) 100%); z-index: 1; }
  .service-bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
  .service-bg-card:hover .service-bg-img { transform: scale(1.05); }
  .service-content { position: relative; z-index: 2; padding: 40px; }
  .service-titre { font-size: 26px; margin: 0 0 12px 0; }
  .service-desc { margin: 0; font-size: 14px; color: #cbd5e1; line-height: 1.5; font-weight: 300; }
  .about-split { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 60px; align-items: center; }
  .about-img { width: 100%; height: 400px; object-fit: cover; }
  .chiffres-flex { display: flex; justify-content: space-between; margin-top: 40px; background: var(--couleur-fond-site); padding: 24px; border-radius: 16px; border: 1px solid #e2e8f0; }
  .chiffre-item { text-align: center; flex: 1; }
  .chiffre-num { font-size: 36px; font-weight: 900; color: var(--couleur-accent); display: block; }
  .chiffre-label { font-size: 12px; color: var(--couleur-texte); text-transform: uppercase; margin-top: 4px; display: block; opacity: 0.8; }
  .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 32px; }
  .portfolio-card { background: var(--couleur-fond-site-light); overflow: hidden; border: 1px solid #e2e8f0; }
  .portfolio-img-box { position: relative; height: 260px; overflow: hidden; }
  .portfolio-img { width: 100%; height: 100%; object-fit: cover; }
  .portfolio-theme { position: absolute; top: 16px; left: 16px; background: var(--couleur-fond-bloc); color: white; padding: 4px 12px; font-size: 11px; text-transform: uppercase; font-weight: 600; border-radius: 4px; }
  .portfolio-info { padding: 20px; font-weight: 600; color: var(--couleur-fond-bloc); font-size: 16px; }
  .reviews-split { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 900px; margin: 0 auto; }
  .widget { background: var(--couleur-fond-site-light); border: 1px solid #e2e8f0; padding: 32px; border-radius: 24px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
  .rating-num { font-size: 44px; font-weight: 900; color: var(--couleur-fond-bloc); }
  .rating-stars { color: #f59e0b; font-size: 20px; margin: 8px 0; }
  .review { background: var(--couleur-fond-site); padding: 24px; border-radius: 16px; text-align: left; margin-bottom: 16px; }
  .review-meta { font-weight: bold; font-size: 14px; color: var(--couleur-fond-bloc); margin-bottom: 8px; display: block; }
  .review-text { font-style: italic; color: var(--couleur-texte); margin: 0; font-size: 14px; line-height: 1.5; font-weight: 300; }
  .footer { background: var(--couleur-fond-bloc); color: white; padding: 80px 0; border-top: 8px solid var(--couleur-accent); }
  .info-box { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
  gap: 24px; 
  background: var(--couleur-fond-site-light); 
  border: 1px solid rgba(0, 0, 0, 0.08); 
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
  /* ------------------------------------------------------------------------- */
  padding: 32px; 
  border-radius: 24px; 
  max-width: 700px; 
  margin: 40px auto 0 auto; 
}
  .info-label { 
  font-size: 11px; 
  color: var(--couleur-accent); /* Reste bien visible */
  font-weight: bold; 
  margin-bottom: 8px; 
  letter-spacing: 1px; 
}

.info-val { 
  margin: 0; 
  font-size: 15px; 
  color: var(--couleur-texte); /* MODIFIÉ : Utilise la couleur de texte principale du thème */
}
</style>

<script>
  function changePalette(themeName) {
    document.documentElement.setAttribute('data-theme', themeName);
  }
  
  window.addEventListener('DOMContentLoaded', () => {
    const path = window.location.pathname;
    let defaultPalette = 'p1';
    
    if (path.includes('paysagiste') || path.includes('jardinier')) {
      defaultPalette = 'p2';
    } else if (path.includes('fleuriste')) {
      defaultPalette = 'p3';
    } else if (path.includes('plombier')) {
      defaultPalette = 'p4';
    } else if (path.includes('electricien')) {
      defaultPalette = 'p5';
    }
    
    document.getElementById('themeChanger').value = defaultPalette;
    changePalette(defaultPalette);
  });
</script>
